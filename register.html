<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SecureStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-light">

    <div class="container d-flex flex-column min-vh-100 justify-content-center py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">

                <!-- Logo -->
                <div class="text-center mb-4">
                    <a class="d-flex align-items-center justify-content-center gap-2 text-decoration-none"
                        href="index.html">
                        <i class="bi bi-box-seam-fill text-primary fs-1"></i>
                        <span class="fs-3 fw-bold text-dark">Secure<span class="text-primary">Store</span></span>
                    </a>
                </div>

                <!-- Register Card -->
                <div class="card border-0 shadow-lg rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <h4 class="fw-bold mb-4 text-center">Create an Account</h4>

                        <form action="dashboard.html">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">First Name</label>
                                    <input type="text" class="form-control bg-light border-0 py-2.5" placeholder="John"
                                        required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Last Name</label>
                                    <input type="text" class="form-control bg-light border-0 py-2.5" placeholder="Doe"
                                        required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label small fw-bold">Email Address</label>
                                    <input type="email" class="form-control bg-light border-0 py-2.5"
                                        placeholder="name@example.com" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label small fw-bold">Create Password</label>
                                    <input type="password" class="form-control bg-light border-0 py-2.5"
                                        placeholder="Min. 8 characters" required>
                                </div>
                                <div class="col-12">
                                    <div class="form-check small text-secondary">
                                        <input class="form-check-input" type="checkbox" id="terms" required>
                                        <label class="form-check-label" for="terms">
                                            I agree to the <a href="#">Terms of Service</a> & <a href="#">Privacy
                                                Policy</a>
                                        </label>
                                    </div>
                                </div>
                                <div class="col-12 mt-4">
                                    <button type="submit"
                                        class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow">Create
                                        Account</button>
                                </div>
                            </div>

                            <!-- Divider -->
                            <div class="divider-text my-4">
                                <hr>
                                <span>or sign up with</span>
                                <hr>
                            </div>

                            <!-- Social Login Buttons -->
                            <div class="social-login-buttons mb-4">
                                <!-- Google -->
                                <button type="button" class="social-login-btn">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
                                        <path fill="#FFC107"
                                            d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" />
                                        <path fill="#FF3D00"
                                            d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" />
                                        <path fill="#4CAF50"
                                            d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" />
                                        <path fill="#1976D2"
                                            d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" />
                                    </svg>
                                    <span>Google</span>
                                </button>

                                <!-- Facebook -->
                                <button type="button" class="social-login-btn">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
                                        <path fill="#1877F2"
                                            d="M24 4C12.954 4 4 12.954 4 24c0 9.983 7.314 18.257 16.875 19.757V29.625h-5.078V24h5.078v-4.297c0-5.016 2.988-7.781 7.555-7.781 2.188 0 4.477.39 4.477.39v4.922h-2.523c-2.484 0-3.259 1.543-3.259 3.125V24h5.547l-.887 5.625h-4.66v14.132C36.686 42.257 44 33.983 44 24c0-11.046-8.954-20-20-20z" />
                                        <path fill="#fff"
                                            d="M33.113 29.625l.887-5.625h-5.547v-3.641c0-1.582.775-3.125 3.259-3.125h2.523v-4.922s-2.289-.39-4.477-.39c-4.567 0-7.555 2.765-7.555 7.781V24h-5.078v5.625h5.078v14.132c1.02.16 2.062.243 3.125.243s2.105-.083 3.125-.243V29.625h4.66z" />
                                    </svg>
                                    <span>Facebook</span>
                                </button>
                            </div>

                            <div class="text-center small text-secondary">
                                Already have an account? <a href="login.html" class="fw-bold text-decoration-none">Log
                                    In</a>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Footer Links -->
                <div class="text-center mt-4 small text-secondary">
                    &copy; 2026 SecureStore
                </div>
            </div>
        </div>
    </div>

    <!-- Theme Toggle -->
    <div class="position-fixed bottom-0 end-0 p-3">
        <div class="theme-toggle-btn bg-white rounded-circle shadow p-3 d-flex align-items-center justify-content-center"
            id="theme-toggle" style="width: 50px; height: 50px; cursor: pointer;">
            <i class="bi bi-moon-stars-fill" id="theme-icon"></i>
        </div>
    </div>

    <script src="assets/js/main.js"></script>

    <!-- Back to Top Button -->
    <button id="back-to-top" class="back-to-top" title="Back to Top" aria-label="Back to Top">
        <i class="bi bi-arrow-up"></i>
    </button>
</body>

</html>
