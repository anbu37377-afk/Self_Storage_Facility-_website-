<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - SecureStore</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body
    class="bg-dark text-white d-flex align-items-center justify-content-center min-vh-100 text-center overflow-hidden position-relative">

    <!-- Background Decoration -->
    <div class="position-absolute w-100 h-100"
        style="background: radial-gradient(circle at 50% 50%, #2c3035 0%, #212529 100%); z-index: -1;"></div>

    <div class="container position-relative z-1">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="mb-4">
                    <i class="bi bi-box-seam-fill text-primary display-3"></i>
                </div>
                <h1 class="display-4 fw-bold mb-4">We're Almost Ready!</h1>
                <p class="lead opacity-75 mb-5">We're building a brand new self-storage experience for you. Secure,
                    smart, and fully online rentals are just around the corner.</p>

                <form class="mx-auto" style="max-width: 400px;">
                    <div class="input-group mb-3">
                        <input type="email" class="form-control py-3 border-0" placeholder="Enter your email"
                            aria-label="Enter your email">
                        <button class="btn btn-primary fw-bold px-4" type="button">Notify Me</button>
                    </div>
                </form>

                <div class="mt-5 small text-secondary">
                    &copy; 2026 SecureStore. All rights reserved. <br>
                    <a href="index.html"
                        class="text-secondary text-decoration-none border-bottom border-secondary pb-1 mt-2 d-inline-block">Back
                        to current site (Dev Mode)</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Back to Top Button -->
    <button id="back-to-top" class="back-to-top" title="Back to Top" aria-label="Back to Top">
        <i class="bi bi-arrow-up"></i>
    </button>

    <script>
        // Back to Top Button Logic
        const backToTopBtn = document.getElementById('back-to-top');
        if (backToTopBtn) {
            window.addEventListener('scroll', () => {
                if (window.scrollY > 300) {
                    backToTopBtn.classList.add('visible');
                } else {
                    backToTopBtn.classList.remove('visible');
                }
            });
            backToTopBtn.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }
    </script>
</body>

</html>
